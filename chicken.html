<!DOCTYPE html><!--속성 = "속성값" 속성: 태그를 의미나 기능적으로 보호해주는 역할-->

<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>치킨</title>
    <!-- CSS 첫번 째 : 내부 스타일 시트 <style 사용>-->
    <!-- CSS 두번 째 : 외부 스타일 시트 < .css로 생성>-->
    <link href="style.css" rel="stylesheet">

    
<body>
    <!-- CSS 세번 째 : 인라인 스타일 <밑에 h1 style ="" 형식>-->
    <h1 style="
        color:red;
        font-size:60px;
        font-family: 'Times New Roman', Times, serif;
        font-weight: bold;
    ">치킨</h1>
    <a href="https://namu.wiki/w/%EC%B9%98%ED%82%A8" target="_blank">
        <img src="./chicken.jpg" alt="맛있는 치킨 사진" width="400">
    </a>

    <p>치킨은 너무 맛있어~ <br>
        우리엄마도 좋아해!</p>

    <p><strong>중요 : 혼자 먹다 둘이 죽어도 모를 맛!<br> <!--컴퓨터에게 알려주는거 strong,em-->
    <em>(개인적인 견해입니다.)</em></strong></p>

    <p><b>중요 : 혼자 먹다 둘이 죽어도 모를 맛!<br> 
        <i>(개인적인 견해입니다.)</i></b></p>

    <h2>레시피</h2>
    <h3>재료</h3>
    <ul><!--순서없는 리스트-->
        <li>닭</li>
        <li>밀가루</li>
        <li>기름</li>
    </ul>


    <h3>만드는 방법</h3>
    <ol> <!--순서있는 리스트-->
        <li>닭을 손질한다</li>
        <li>밀가루를 입힌다</li>
        <li>기름에 튀긴다</li>
        <li>맛있게 먹는다</li>
    </ol>
    
</body>
</head>
</html>
